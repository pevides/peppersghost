<!doctype html>
<html>
<head>
  <meta charset="utf-8">
    <title>Hello 3D World!</title>
    <link rel="stylesheet" href="css/style.css">
    <script type="importmap">
        {
          "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@v0.163.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
          }
        }
    </script>
</head>
<body>
    <div id="hud" class="hud-panel" aria-label="Painel de controlo 3D">
      <div class="hud-header">
        <span class="hud-kicker">HUD 3D</span>
        <h1>Visualizador</h1>
        <p>Clique ou toque para trocar modelos, materiais, luzes e o efeito anaglífico.</p>
      </div>

      <section class="hud-group">
        <h2>Modelos</h2>
        <div class="hud-grid">
          <button id="tesseractBtn" class="hud-button" type="button" data-model="0">Tesseract</button>
          <button id="catBtn" class="hud-button" type="button" data-model="1">Gato</button>
          <button id="artemisBtn" class="hud-button" type="button" data-model="2">NASA Artemis</button>
        </div>
      </section>

      <section class="hud-group">
        <h2>Sombreamento</h2>
        <div class="hud-grid">
          <button class="hud-button" type="button" data-shading="lambert">Lambert</button>
          <button class="hud-button" type="button" data-shading="phong">Phong</button>
        </div>
      </section>

      <section class="hud-group">
        <h2>Luzes</h2>
        <div class="hud-grid">
          <button class="hud-button" type="button" data-light="directional">Direccional</button>
          <button class="hud-button" type="button" data-light="point">Pontual</button>
          <button class="hud-button" type="button" data-light="spot">Spotlight</button>
          <button id="lightingBtn" class="hud-button hud-button-wide" type="button">Iluminação</button>
        </div>
      </section>

      <section class="hud-group hud-footer">
        <h2>Efeitos</h2>
        <div class="hud-grid">
          <button id="anaglyphBtn" class="hud-button" type="button">Anaglífico</button>
          <button id="reverseHUDBtn" class="hud-button" type="button">Invert HUD</button>
        </div>
      </section>
    </div>
    <script type="module" src="js/main-script.js"></script>
</body>
</html>
